<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alviks Bygg</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif}
#btn{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:#eab32a;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,92,26,0.4);z-index:9998;color:white}
#win{position:fixed;bottom:96px;right:24px;width:340px;max-height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.2);display:flex;flex-direction:column;overflow:hidden;z-index:9999}
#win.hidden{display:none}
#hdr{background:#eab32a;padding:1rem;display:flex;align-items:center;gap:.7rem}
#logo{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;color:#000}
#hdr-txt{flex:1}
#hdr-txt strong{display:block;color:#fff;font-size:.95rem}
#hdr-txt span{color:rgba(255,255,255,0.85);font-size:.72rem}
#close{background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:1.1rem;cursor:pointer}
#msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.7rem;background:#f8f8f8}
.bot{max-width:85%;padding:.65rem .9rem;font-size:.84rem;line-height:1.5;background:#fff;border-radius:14px 14px 14px 4px;align-self:flex-start;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.user{max-width:85%;padding:.65rem .9rem;font-size:.84rem;line-height:1.5;background:#eab32a;border-radius:14px 14px 4px 14px;align-self:flex-end;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
#qbtns{display:flex;flex-direction:column;gap:.5rem}
.qbtn{display:flex;align-items:center;justify-content:space-between;background:#fff5f0;border:1px solid #ffd5c0;border-radius:10px;padding:.7rem 1rem;cursor:pointer;font-size:.87rem;color:#1a1a1a;width:100%}
.qbtn:hover{background:#ffe8d8}
#typing{display:none;gap:5px;padding:.4rem 0;align-self:flex-start}
#typing span{width:8px;height:8px;border-radius:50%;background:#9e9e9e;opacity:.7;animation:b 1.1s infinite}
#typing span:nth-child(2){animation-delay:.18s}
#typing span:nth-child(3){animation-delay:.36s}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
#inp-area{padding:.75rem;border-top:1px solid #eee;display:flex;gap:.5rem;background:#fff}
#inp{flex:1;border:1px solid #ddd;border-radius:20px;padding:.55rem 1rem;font-size:.85rem;outline:none;background:#f5f5f5;color:#333}
#send{width:38px;height:38px;border-radius:50%;background:#eab32a;border:none;color:#fff;font-size:1rem;cursor:pointer;flex-shrink:0}
#status{font-size:.72rem;color:#999;padding:.3rem 1rem;background:#f8f8f8;text-align:center}
  @media (max-width: 480px) {
  #win {
    width: calc(100vw - 24px) !important;
    right: 12px !important;
    left: 12px !important;
    bottom: 80px !important;
    max-height: 70vh !important;
  }
  #btn {
    bottom: 16px !important;
    right: 16px !important;
  }
}
</style>
</head>
<body>
<button id="btn" onclick="toggleChat()">💬</button>
<div id="win" class="hidden">
  <div id="hdr" style="background:#eab32a;">
    <div id="logo"><img src="https://alviksbygg.se/wp-content/uploads/2025/06/Alviks-logga-2-scaled-e1750697210112.png" style="width:36px;height:36px;object-fit:contain;border-radius:50%;background:#000;padding:2px;" alt="Alviks"/></div>
    <div id="hdr-txt">
      <strong>Alviks Bygg</strong>
      <span>Hur kan vi hjälpa dig?</span>
    </div>
    <button id="close" onclick="toggleChat()">x</button>
<button onclick="rensaChatt()" style="background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:0.7rem;cursor:pointer;">🗑️</button>
  </div>
  <div id="status">Laddar information...</div>
  <div id="msgs">
    <div class="bot" id="welcome-msg">Hej! Välkommen till Alviks Bygg. Vad kan vi hjälpa dig med?</div>
    <div id="qbtns">
      <button class="qbtn" onclick="send('Vilka tjänster erbjuder ni?')">🔨 Tjänster ›</button>
      <button class="qbtn" onclick="send('Hur kontaktar jag er?')">📞 Kontakt ›</button>
      <button class="qbtn" onclick="send('Var är ni verksamma?')">📍 Orter ›</button>
      <button class="qbtn" onclick="visaOffertFormular()" style="background:#eab32a;color:#fff;border:none;">📋 Begär offert</button>
    </div>
    <div id="typing"><span></span><span></span><span></span></div>
  </div>
  <div id="inp-area">
    <input id="inp" type="text" placeholder="Skriv din fråga..." autocomplete="off"/>
    <button id="send">&#62;</button>
  </div>
</div>
<script>
var info="",loading=false;
var bedomningVisad=false;
  var vanligaFragor={
  "adress":"Ni hittar oss på Fockvägen 17, 865 31 Alnö.",
  "telefon":"Vårt telefonnummer är 070-888 62 22. Ring oss gärna!",
  "mail":"Vår e-post är info@alviksbygg.se. Vi svarar inom 24 timmar!",
  "öppettider":"Vi har öppet Mån-Fre 06:30-17:00.",
  "pris":"Vi erbjuder kostnadsfria offertförfrågningar. Tryck på 'Begär offert' så återkommer vi!",
  "offert":"Vi erbjuder kostnadsfria offertförfrågningar. Tryck på 'Begär offert' så återkommer vi!",
  "sundsvall":"Ja, vi är verksamma i Sundsvall!",
  "Gästrikland":"Ja, vi är verksamma i Gästrikland!",
  "Jämtland/Härjedalen":"Ja, vi är verksamma i Jämtland/Härjedalen!",
  "Västernorrland":"Ja, vi är verksamma i Västernorrland",  
  "betong":"Vi utför alla typer av betongarbeten. Tryck på 'Tjänster' för mer info!",
  "dränering":"Vi utför dräneringsarbeten. Kontakta oss för offert!",
  "stenläggning":"Vi lägger sten och plattor. Kontakta oss för offert!",
};
var msgs=JSON.parse(localStorage.getItem("solidchat_history")||"[]");
document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")send();});
var placeholders=["Skriv din fråga...","Write your question...","Qor su'aashaada...","Schreib deine Frage..."];
var pi=0;
setInterval(function(){
  pi=(pi+1)%placeholders.length;
  document.getElementById("inp").placeholder=placeholders[pi];
},2000);
document.getElementById("send").addEventListener("click",function(){send();});
 function rensaChatt(){
  var m=document.getElementById("msgs");
  m.innerHTML='<div class="bot" id="welcome-msg">Hej! Välkommen till Alviks Bygg. '+visaOppettider()+' Vad kan vi hjälpa dig med?</div>'+
    '<div id="qbtns">'+
    '<button class="qbtn" onclick="send(\'Vilka tjänster erbjuder ni?\')">🔨 Tjänster ›</button>'+
    '<button class="qbtn" onclick="send(\'Hur kontaktar jag er?\')">📞 Kontakt ›</button>'+
    '<button class="qbtn" onclick="send(\'Var är ni verksamma?\')">📍 Orter ›</button>'+
    '<button class="qbtn" onclick="visaOffertFormular()" style="background:#eab32a;color:#fff;border:none;">📋 Begär offert</button>'+
    '</div>'+
    '<div id="typing"><span></span><span></span><span></span></div>';
  msgs=[];
  bedomningVisad=false;
  localStorage.removeItem("solidchat_history");
}
  function visaOffertFormular(){
  var qb=document.getElementById("qbtns");if(qb)qb.remove();
  var d=document.createElement("div");
  d.className="bot";
  d.style.width="100%";
  d.innerHTML='<strong>Begär offert</strong><br><br>'+
    '<input id="of-namn" placeholder="Namn" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br>'+
    '<input id="of-tel" placeholder="Telefon" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br>'+
    '<input id="of-mail" placeholder="E-post" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br>'+
    '<textarea id="of-msg" placeholder="Beskriv ditt projekt..." style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;height:80px;"></textarea><br>'+
    '<button onclick="skickaOffert()" style="background:#9e9e9e;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;width:100%;">Skicka offertförfrågan</button>';
  var m=document.getElementById("msgs");
  m.insertBefore(d,document.getElementById("typing"));
  m.scrollTop=m.scrollHeight;
}
function skickaOffert(){
  var namn=document.getElementById("of-namn").value;
  var tel=document.getElementById("of-tel").value;
  var mail=document.getElementById("of-mail").value;
  var msg=document.getElementById("of-msg").value;
  if(!namn||!tel||!msg){addMsg("Fyll i namn, telefon och projektbeskrivning!","bot");return;}
  send("Offertförfrågan från "+namn+" ("+tel+", "+mail+"): "+msg);
}
  function visaBedomning(){
  var d=document.createElement("div");
  d.className="bot";
  d.style.width="100%";
  d.innerHTML='<strong>Hur nöjd var du med hjälpen?</strong><br><br>'+
    '<div style="font-size:1.8rem;cursor:pointer;">'+
    '<span onclick="skickaBedomning(1)">⭐</span>'+
    '<span onclick="skickaBedomning(2)">⭐</span>'+
    '<span onclick="skickaBedomning(3)">⭐</span>'+
    '<span onclick="skickaBedomning(4)">⭐</span>'+
    '<span onclick="skickaBedomning(5)">⭐</span>'+
    '</div>';
  var m=document.getElementById("msgs");
  m.insertBefore(d,document.getElementById("typing"));
  m.scrollTop=m.scrollHeight;
}

function skickaBedomning(stjarnor){
  var text="★".repeat(stjarnor)+"☆".repeat(5-stjarnor);
  addMsg("Tack för din bedömning: "+text,"bot");
}
  function visaOppettider(){
  var nu=new Date();
  var dag=nu.getDay();
  var timme=nu.getHours();
  var oppet=(dag>=1&&dag<=5&&timme>=6.30&&timme<17);
  return oppet ? "Vi är öppna just nu! Ringa oss på 070-888 62 22." : "Vi är stängda just nu. Öppettider: Mån-Fre 06:30-17:00.";
}
fetch("/api/fetch-company").then(function(r){return r.json();}).then(function(d){
  if(d.content){info=d.content;document.getElementById("status").textContent="Redo att hjälpa dig!";}
  setTimeout(function(){document.getElementById("status").style.display="none";},3000);
}).catch(function(){document.getElementById("status").style.display="none";});
function toggleChat(){
  var w=document.getElementById("win"),b=document.getElementById("btn");
  if(!w.classList.contains("hidden")&&msgs.length>0&&!bedomningVisad){
    bedomningVisad=true;
    visaBedomning();
  }
  w.classList.toggle("hidden");
  b.textContent=w.classList.contains("hidden")?"💬":"x";
}
function addMsg(text,role){
  var qb=document.getElementById("qbtns");if(qb)qb.remove();
  var d=document.createElement("div");d.className=role==="user"?"user":"bot";d.textContent=text;
  var m=document.getElementById("msgs");m.insertBefore(d,document.getElementById("typing"));
  var bubblor=m.querySelectorAll(".bot,.user");
  if(bubblor.length>20){
    bubblor[0].remove();
  }
  m.scrollTop=m.scrollHeight;
}
async function send(text){
  var inp=document.getElementById("inp");
  var msg=text||inp.value.trim();if(!msg||loading)return;
  var msgLower=msg.toLowerCase();
  for(var key in vanligaFragor){
    if(msgLower.includes(key)){
      inp.value="";
      addMsg(msg,"user");
      addMsg(vanligaFragor[key],"bot");
      return;
    }
  }
  inp.value="";loading=true;
  document.getElementById("send").disabled=true;
  addMsg(msg,"user");msgs.push({role:"user",content:msg});
  if(msgs.length>20) msgs=msgs.slice(-20);
  localStorage.setItem("solidchat_history",JSON.stringify(msgs));
  document.getElementById("typing").style.display="flex";

  var timeout=setTimeout(function(){
    document.getElementById("typing").style.display="none";
    addMsg("Det tog för lång tid att svara. Försök igen!","bot");
    loading=false;
    document.getElementById("send").disabled=false;
  },10000);

  try{
    var res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:msgs,info:info})});
    var data=await res.json();
    clearTimeout(timeout);
    document.getElementById("typing").style.display="none";
    var reply=(data&&data.content&&data.content[0]&&data.content[0].text)?data.content[0].text:"Kunde inte svara.";
    addMsg(reply,"bot");msgs.push({role:"assistant",content:reply});
    localStorage.setItem("solidchat_history",JSON.stringify(msgs));
  }catch(e){
    clearTimeout(timeout);
    document.getElementById("typing").style.display="none";
    addMsg("Något gick fel: "+e.message,"bot");
  }
  loading=false;
  document.getElementById("send").disabled=false;
}
}
  inp.value="";loading=true;
  addMsg(msg,"user");msgs.push({role:"user",content:msg});
  localStorage.setItem("solidchat_history",JSON.stringify(msgs));
  document.getElementById("typing").style.display="flex";
  try{
    var res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:msgs,info:info})});
    var data=await res.json();
    document.getElementById("typing").style.display="none";
    var reply=(data&&data.content&&data.content[0]&&data.content[0].text)?data.content[0].text:"Kunde inte svara.";
    addMsg(reply,"bot");msgs.push({role:"assistant",content:reply});
    localStorage.setItem("solidchat_history",JSON.stringify(msgs));
  }catch(e){
    document.getElementById("typing").style.display="none";
    addMsg("Något gick fel: "+e.message,"bot");
  }
  loading=false;
}
document.getElementById("welcome-msg").textContent="Hej! Välkommen till AlviksBygg. "+visaOppettider()+" Vad kan vi hjälpa dig med?";
</script>
</body>
</html>
