<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solid Bygg och Betong - Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    #chat-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 60px; height: 60px; border-radius: 50%;
      background: #e85c1a; border: none;
      font-size: 1.6rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,92,26,0.4);
      z-index: 9998; display: flex;
      align-items: center; justify-content: center;
      color: white;
    }

    #chat-window {
      position: fixed; bottom: 96px; right: 24px;
      width: 340px; max-height: 520px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      display: flex; flex-direction: column;
      overflow: hidden; z-index: 9999;
    }
    #chat-window.hidden { display: none; }

    #chat-header {
      background: #e85c1a; padding: 1rem;
      display: flex; align-items: center; gap: 0.7rem;
    }
    #chat-logo {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.85rem; color: #fff;
      text-align: center; line-height: 1.2;
    }
    #chat-header-text strong { display: block; color: #fff; font-size: 0.95rem; }
    #chat-header-text span { color: rgba(255,255,255,0.85); font-size: 0.72rem; }
    #close-btn {
      margin-left: auto; background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%; width: 28px; height: 28px;
      color: #fff; font-size: 1.1rem; cursor: pointer;
    }

    #messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.7rem;
      background: #f8f8f8;
    }
    .msg {
      max-width: 85%; padding: 0.65rem 0.9rem;
      font-size: 0.84rem; line-height: 1.5;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .msg.bot { background: #fff; border-radius: 14px 14px 14px 4px; align-self: flex-start; color: #1a1a1a; }
    .msg.user { background: #e85c1a; border-radius: 14px 14px 4px 14px; align-self: flex-end; color: #fff; }

    #quick-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
    .quick-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff5f0; border: 1px solid #ffd5c0;
      border-radius: 10px; padding: 0.7rem 1rem;
      cursor: pointer; font-size: 0.87rem; color: #1a1a1a; width: 100%;
    }
    .quick-btn:hover { background: #ffe8d8; }

    #typing { display: none; gap: 5px; padding: 0.4rem 0; align-self: flex-start; }
    #typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e85c1a; opacity: 0.7;
      animation: bounce 1.1s infinite;
    }
    #typing span:nth-child(2) { animation-delay: 0.18s; }
    #typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    #input-area {
      padding: 0.75rem; border-top: 1px solid #eee;
      display: flex; gap: 0.5rem; background: #fff;
    }
    #user-input {
      flex: 1; border: 1px solid #ddd; border-radius: 20px;
      padding: 0.55rem 1rem; font-size: 0.85rem;
      outline: none; background: #f5f5f5; color: #333;
    }
    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #e85c1a; border: none; color: #fff;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
    }
    #status { font-size: 0.72rem; color: #999; padding: 0.3rem 1rem; background: #f8f8f8; text-align: center; }
  </style>
</head>
<body>

<button id="chat-btn" onclick="toggleChat()">💬</button>

<div id="chat-window" class="hidden">
  <div id="chat-header">
    <div id="chat-logo">SBB</div>
    <div id="chat-header-text">
      <strong>Solid Bygg och Betong</strong>
      <span>Hur kan vi hjälpa dig? 🏗️</span>
    </div>
    <button id="close-btn" onclick="toggleChat()">×</button>
  </div>

  <div id="status">Laddar företagsinformation...</div>

  <div id="messages">
    <div class="msg bot">Hej! 👋 Välkommen till Solid Bygg och Betong. Vad kan vi hjälpa dig med?</div>
    <div id="quick-buttons">
      <button class="quick-btn" onclick="send('Vilka tjänster erbjuder ni?')">🔨 Tjänster <span>›</span></button>
      <button class="quick-btn" onclick="send('Hur kontaktar jag er?')">📞 Kontakt <span>›</span></button>
      <button class="quick-btn" onclick="send('Kan jag få en offert?')">📋 Offert <span>›</span></button>
      <button class="quick-btn" onclick="send('Var är ni verksamma?')">📍 Orter <span>›</span></button>
    </div>
    <div id="typing"><span></span><span></span><span></span></div>
  </div>

  <div id="input-area">
    <input id="user-input" placeholder="Skriv din fråga..." onkeydown="if(event.key==='Enter') send()"/>
    <button id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
  let companyInfo = "";
  let messages = [];
  let loading = false;

  async function loadCompanyInfo() {
    try {
      const res = await fetch("/api/fetch-company");
      const data = await res.json();
      if (data.content) {
        companyInfo = data.content;
        document.getElementById("status").textContent = "✓ Redo att hjälpa dig!";
        setTimeout(() => document.getElementById("status").style.display = "none", 3000);
      }
    } catch(e) {
      document.getElementById("status").textContent = "Ansluten";
    }
  }

  function toggleChat() {
    const w = document.getElementById("chat-window");
    const btn = document.getElementById("chat-btn");
    w.classList.toggle("hidden");
    btn.textContent = w.classList.contains("hidden") ? "💬" : "×";
  }

  function addMessage(text, role) {
    const qb = document.getElementById("quick-buttons");
    if (qb) qb.remove();
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.textContent = text;
    const msgs = document.getElementById("messages");
    msgs.insertBefore(div, document.getElementById("typing"));
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function send(text) {
    const input = document.getElementById("user-input");
    const msg = text || input.value.trim();
    if (!msg || loading) return;
    input.value = "";
    loading = true;

    addMessage(msg, "user");
    messages.push({ role: "user", content: msg });

    const typing = document.getElementById("typing");
    typing.style.display = "flex";

    try {
      const systemPrompt = "Du är en hjälpsam assistent för Solid Bygg och Betong, ett byggföretag i Sundsvall och Kramfors som specialiserar sig på betong- och byggarbeten, dränering och stenläggning. Svara alltid kort och professionellt." +
        (companyInfo ? "\n\nHär är information från företagets hemsida:\n" + companyInfo : "");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 500,
          system: systemPrompt,
          messages: messages
        })
      });

      const data = await res.json();
      typing.style.display = "none";

      if (data.error) {
        addMessage("Fel: " + data.error.message, "bot");
      } else {
        const reply = data?.content?.[0]?.text || "Kunde inte svara just nu.";
        addMessage(reply, "bot");
        messages.push({ role: "assistant", content: reply });
      }
    } catch(e) {
      typing.style.display = "none";
      addMessage("Något gick fel. Försök igen!", "bot");
    }
    loading = false;
  }

  loadCompanyInfo();
</script>
</body>
</html>
